name: Generate ELO Rankings

on:
  schedule:
    - cron: '0 6 * * 1'  # Jeden Montag um 6 Uhr UTC
  workflow_dispatch:      # auch manuell auslösbar

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests

      - name: Import tournament data
        env:
          TOURNAMENT_API_TOKEN: ${{ secrets.TOURNAMENT_API_TOKEN }}
        run: |
          python3 import_tournaments.py \
            --token "$TOURNAMENT_API_TOKEN" \
            --db test.db

      - name: Generate HTML
        run: python3 generate.py test.db .

      - name: Commit & push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add test.db index.html players/
          git diff --cached --quiet || git commit -m "chore: weekly rankings update [skip ci]"
          git push
