name: Generate ELO Rankings

on:
  push:
    paths:
      - 'test.db'   # nur auslösen wenn die DB gepusht wird
  workflow_dispatch:  # auch manuell auslösbar

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate HTML
        run: python3 generate.py test.db .

      - name: Commit & push generated files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html players/
          git diff --cached --quiet || git commit -m "chore: regenerate rankings [skip ci]"
          git push
